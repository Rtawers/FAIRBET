{% extends "base.html" %}
{% load static %}

{% block title %}Evento — FairBet Lab{% endblock %}

{% block content %}
<div id="evento-container">
  <div class="text-center py-5">
    <div class="spinner-border text-primary"></div>
    <p class="mt-2 text-muted">Cargando evento...</p>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
const TOKEN = localStorage.getItem('access_token');
if (!TOKEN) window.location.href = '/';

const EVENT_ID = {{ event_id }};

async function cargarEvento() {
  const res = await fetch(`/api/events/events/${EVENT_ID}/`, {
    headers: { 'Authorization': `Bearer ${TOKEN}` }
  });

  if (res.status === 401) {
    localStorage.removeItem('access_token');
    window.location.href = '/';
    return;
  }

  const ev = await res.json();
  // ... resto del código

  document.getElementById('evento-container').innerHTML = `
    <div class="d-flex justify-content-between align-items-center mb-4">
      <a href="/eventos/" class="btn btn-outline-secondary btn-sm">
        <i class="bi bi-arrow-left"></i> Volver
      </a>
      <span class="badge bg-${ev.status === 'LIVE' ? 'danger' : 'success'} fs-6">
        ${ev.status === 'LIVE' ? '🔴 EN VIVO' : ev.status}
      </span>
    </div>

    <div class="card shadow mb-4">
      <div class="card-header bg-primary text-white">
        <h4 class="mb-0">${ev.home_team} vs ${ev.away_team}</h4>
        <small>${new Date(ev.starts_at).toLocaleString('es-PE')}</small>
      </div>
      <div class="card-body">
        ${ev.markets.map(m => `
          <h5 class="mt-3">${m.name}
            <span class="badge bg-${m.status === 'OPEN' ? 'success' : 'warning'} ms-2">
              ${m.status}
            </span>
          </h5>
          <div class="d-flex gap-3 flex-wrap mt-2">
            ${m.selections.map(s => `
              <div class="card flex-grow-1 text-center" style="min-width:120px">
                <div class="card-body py-3">
                  <p class="mb-1 fw-bold">${s.name}</p>
                  <h3 class="text-primary mb-2"
                      data-outcome="${s.outcome}"
                      data-market="${m.id}">
                    ${parseFloat(s.odds).toFixed(2)}
                  </h3>
                  <button class="btn btn-primary btn-sm w-100"
                    onclick="seleccionar(${ev.id}, ${m.id}, ${s.id}, '${s.name}', ${s.odds})">
                    Apostar
                  </button>
                </div>
              </div>
            `).join('')}
          </div>
        `).join('')}
      </div>
    </div>
  `;
}

let seleccionActual = null;

function seleccionar(eventId, marketId, selectionId, nombre, odds) {
  seleccionActual = { eventId, marketId, selectionId, nombre, odds };
  document.getElementById('sel-nombre').textContent = nombre;
  document.getElementById('sel-odds').textContent = parseFloat(odds).toFixed(2);
  document.getElementById('monto-apuesta').value = '';
  document.getElementById('msg-apuesta').innerHTML = '';
  new bootstrap.Modal(document.getElementById('modalApuesta')).show();
}

async function confirmarApuesta() {
  const monto = document.getElementById('monto-apuesta').value;
  const msg = document.getElementById('msg-apuesta');

  if (!monto || parseFloat(monto) <= 0) {
    msg.innerHTML = '<span class="text-danger">Ingresá un monto válido.</span>';
    return;
  }

  const key = `bet-${Date.now()}`;
  const res = await fetch('/api/betting/bets/', {
    method: 'POST',
    headers: {
      'Authorization': `Bearer ${TOKEN}`,
      'Content-Type': 'application/json',
      'Idempotency-Key': key,
    },
    body: JSON.stringify({
      selection_id: seleccionActual.selectionId,
      amount: monto,
    })
  });

  const data = await res.json();
  if (res.ok || res.status === 201) {
    msg.innerHTML = `<span class="text-success">✅ Apuesta confirmada!</span>`;
  } else {
    msg.innerHTML = `<span class="text-danger">❌ ${data.error || data.detail || JSON.stringify(data)}</span>`;
  }
}

cargarEvento();
</script>

<!-- WebSocket odds en vivo -->
<script src="{% static 'js/odds.js' %}"></script>

<!-- Modal apuesta -->
<div class="modal fade" id="modalApuesta" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header bg-primary text-white">
        <h5 class="modal-title"><i class="bi bi-dice-5"></i> Confirmar apuesta</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <p><strong>Selección:</strong> <span id="sel-nombre"></span></p>
        <p><strong>Cuota:</strong> <span id="sel-odds"></span></p>
        <div class="mb-3">
          <label class="form-label">Monto (S/)</label>
          <input type="number" id="monto-apuesta" class="form-control form-control-lg"
                 placeholder="Ej: 50" min="1" step="0.01">
        </div>
        <div id="msg-apuesta"></div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
        <button class="btn btn-primary" onclick="confirmarApuesta()">
          <i class="bi bi-check-lg"></i> Apostar
        </button>
      </div>
    </div>
  </div>
</div>
{% endblock %}
