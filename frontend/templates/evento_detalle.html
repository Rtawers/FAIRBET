{% extends "base.html" %}
{% load static %}

{% block title %}Evento — FairBet Lab{% endblock %}

{% block content %}
<div id="evento-container">
  <div class="text-center py-5">
    <div class="spinner-border text-primary"></div>
    <p class="mt-2 text-muted">Cargando evento...</p>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
const TOKEN = localStorage.getItem('access_token');
if (!TOKEN) window.location.href = '/';

const EVENT_ID = {{ event_id }};
let golesLocal = 0;
let golesVisitante = 0;
let cronometroActivo = false;

function badgeEstado(status) {
  const colores = { 'SCHEDULED': 'var(--fb-green)', 'LIVE': '#e53935', 'FINISHED': '#666', 'SUSPENDED': 'var(--fb-gold)', 'VOIDED': '#444' };
  const labels = { 'SCHEDULED': 'PROGRAMADO', 'LIVE': 'EN VIVO', 'FINISHED': 'FINALIZADO', 'SUSPENDED': 'SUSPENDIDO', 'VOIDED': 'ANULADO' };
  return `<span class="badge fs-6" style="background-color:${colores[status] || '#666'}">${labels[status] || status}</span>`;
}

function puedeApostar(evStatus, mStatus) {
  return (evStatus === 'SCHEDULED' || evStatus === 'LIVE') && mStatus === 'OPEN';
}

function cargarMarcadorGuardado() {
  const marcador = JSON.parse(localStorage.getItem(`marcador_${EVENT_ID}`) || '{"local":0,"visitante":0}');
  golesLocal = marcador.local;
  golesVisitante = marcador.visitante;
}

function guardarMarcador() {
  localStorage.setItem(`marcador_${EVENT_ID}`, JSON.stringify({ local: golesLocal, visitante: golesVisitante }));
}

function iniciarCronometro() {
  if (cronometroActivo) return;
  cronometroActivo = true;

  const key = `cronometro_event_${EVENT_ID}`;
  if (!localStorage.getItem(key)) {
    localStorage.setItem(key, Date.now().toString());
  }

  const golesKey = `goles_programados_${EVENT_ID}`;
  if (!localStorage.getItem(golesKey)) {
    const goles = [
      { minuto: Math.floor(Math.random() * 25) + 10, equipo: Math.random() > 0.5 ? 'local' : 'visitante' },
      { minuto: Math.floor(Math.random() * 20) + 40, equipo: Math.random() > 0.5 ? 'local' : 'visitante' },
      { minuto: Math.floor(Math.random() * 20) + 65, equipo: Math.random() > 0.5 ? 'local' : 'visitante' },
    ];
    localStorage.setItem(golesKey, JSON.stringify(goles));
  }

  const golesProgramados = JSON.parse(localStorage.getItem(golesKey));
  const golesAnotados = new Set();

  setInterval(() => {
    const inicio = parseInt(localStorage.getItem(`cronometro_event_${EVENT_ID}`));
    const totalSegundos = Math.floor((Date.now() - inicio) / 200);
    const mins = Math.floor(totalSegundos / 60);
    const secs = totalSegundos % 60;

    const el = document.getElementById('cronometro');
    if (el) {
      if (mins >= 90) {
        el.textContent = "FT";
        el.style.color = '#666';
      } else {
        el.textContent = `${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}'`;
      }
    }

    for (const gol of golesProgramados) {
      const golKey = `${gol.minuto}_${gol.equipo}`;
      if (mins >= gol.minuto && secs === 0 && !golesAnotados.has(golKey)) {
        golesAnotados.add(golKey);
        registrarGol(gol.equipo);
      }
    }
  }, 200);
}

async function registrarGol(equipo) {
  // Persistir goles
  const marcador = JSON.parse(localStorage.getItem(`marcador_${EVENT_ID}`) || '{"local":0,"visitante":0}');
  if (equipo === 'local') {
    marcador.local++;
    golesLocal = marcador.local;
    const el = document.getElementById('goles-local');
    if (el) {
      el.textContent = golesLocal;
      el.style.transform = 'scale(1.4)';
      el.style.color = 'var(--fb-gold)';
      setTimeout(() => { el.style.transform = 'scale(1)'; el.style.color = '#fff'; }, 800);
    }
  } else {
    marcador.visitante++;
    golesVisitante = marcador.visitante;
    const el = document.getElementById('goles-visitante');
    if (el) {
      el.textContent = golesVisitante;
      el.style.transform = 'scale(1.4)';
      el.style.color = 'var(--fb-gold)';
      setTimeout(() => { el.style.transform = 'scale(1)'; el.style.color = '#fff'; }, 800);
    }
  }
  localStorage.setItem(`marcador_${EVENT_ID}`, JSON.stringify(marcador));

  // Suspender mercados
  try {
    const res = await fetch(`/api/events/events/${EVENT_ID}/`, {
      headers: { 'Authorization': `Bearer ${TOKEN}` }
    });
    const ev = await res.json();
    for (const market of ev.markets) {
      if (market.status === 'OPEN') {
        await fetch(`/api/events/markets/${market.id}/suspend/`, {
          method: 'POST',
          headers: { 'Authorization': `Bearer ${TOKEN}`, 'Content-Type': 'application/json' }
        });
      }
    }
    setTimeout(() => cargarEvento(), 600);

    // Reabrir mercados después de 10 segundos
    setTimeout(async () => {
      try {
        const res2 = await fetch(`/api/events/events/${EVENT_ID}/`, {
          headers: { 'Authorization': `Bearer ${TOKEN}` }
        });
        const ev2 = await res2.json();
        for (const market of ev2.markets) {
          if (market.status === 'SUSPENDED') {
            await fetch(`/api/events/markets/${market.id}/reopen/`, {
              method: 'POST',
              headers: { 'Authorization': `Bearer ${TOKEN}`, 'Content-Type': 'application/json' }
            });
          }
        }
        setTimeout(() => cargarEvento(), 500);
      } catch(e) {}
    }, 10000);
  } catch(e) {}
}

async function cargarEvento() {
  // Restaurar goles desde localStorage antes de renderizar
  cargarMarcadorGuardado();

  const res = await fetch(`/api/events/events/${EVENT_ID}/`, {
    headers: { 'Authorization': `Bearer ${TOKEN}` }
  });

  if (res.status === 401) {
    localStorage.removeItem('access_token');
    window.location.href = '/';
    return;
  }

  const ev = await res.json();

  document.getElementById('evento-container').innerHTML = `
    <div class="d-flex justify-content-between align-items-center mb-3">
      <a href="/eventos/" class="btn btn-outline-secondary btn-sm">
        <i class="bi bi-arrow-left"></i> Volver
      </a>
      ${badgeEstado(ev.status)}
    </div>

    <div class="card mb-4" style="background: linear-gradient(135deg, #0a0f1e 0%, #1a2744 100%);">
      <div class="card-body py-4">
        <div class="row align-items-center text-center">
          <div class="col-4">
            <div style="font-size:1.3rem; font-weight:800; color:#fff;">${ev.home_team}</div>
            <div style="font-size:0.75rem; color:var(--fb-muted); margin-top:4px;">Local</div>
          </div>
          <div class="col-4">
            ${ev.status === 'LIVE' ? `
              <div style="background:#e53935; border-radius:6px; padding:3px 10px; display:inline-block; margin-bottom:8px;">
                <span style="font-size:0.6rem; color:#fff; letter-spacing:2px; font-weight:700;">● LIVE</span>
              </div>
              <div style="font-size:3rem; font-weight:900; color:#fff; font-family:monospace; line-height:1;">
                <span id="goles-local" style="transition: all 0.3s;">${golesLocal}</span>
                <span style="color:var(--fb-muted); margin:0 8px;">:</span>
                <span id="goles-visitante" style="transition: all 0.3s;">${golesVisitante}</span>
              </div>
              <div id="cronometro" style="font-size:0.9rem; color:var(--fb-muted); font-family:monospace; margin-top:6px;">00:00'</div>
            ` : ev.status === 'FINISHED' ? `
              <div style="background:#444; border-radius:6px; padding:3px 10px; display:inline-block; margin-bottom:8px;">
                <span style="font-size:0.6rem; color:#fff; letter-spacing:2px;">FINALIZADO</span>
              </div>
              <div style="font-size:3rem; font-weight:900; color:#aaa; font-family:monospace;">
                ${golesLocal} : ${golesVisitante}
              </div>
            ` : `
              <div style="background:var(--fb-green); border-radius:6px; padding:3px 10px; display:inline-block; margin-bottom:8px;">
                <span style="font-size:0.6rem; color:#fff; letter-spacing:2px;">PROXIMO</span>
              </div>
              <div style="font-size:0.9rem; color:var(--fb-muted); margin-top:8px;">${new Date(ev.starts_at).toLocaleString('es-PE')}</div>
            `}
          </div>
          <div class="col-4">
            <div style="font-size:1.3rem; font-weight:800; color:#fff;">${ev.away_team}</div>
            <div style="font-size:0.75rem; color:var(--fb-muted); margin-top:4px;">Visitante</div>
          </div>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-body">
        ${ev.status === 'FINISHED' ? `
          <div class="alert alert-secondary text-center py-2 mb-3">
            <i class="bi bi-flag-fill"></i> Partido finalizado. Resultado: ${golesLocal} - ${golesVisitante}
          </div>
        ` : ''}
        ${ev.markets.map(m => `
          <h5 class="mt-3 mb-2">${m.name}
            <span class="badge ms-2" style="background-color:${m.status === 'OPEN' ? 'var(--fb-green)' : 'var(--fb-gold)'}; font-size:0.7rem;">${m.status}</span>
            ${m.status === 'SUSPENDED' ? '<small style="color:var(--fb-gold); font-size:0.75rem; margin-left:8px;">Suspendido por gol</small>' : ''}
          </h5>
          <div class="d-flex gap-3 flex-wrap mb-3">
            ${m.selections.map(s => `
              <div class="card flex-grow-1 text-center" style="min-width:120px; ${m.status === 'SUSPENDED' ? 'opacity:0.6;' : ''}">
                <div class="card-body py-3">
                  <p class="mb-1 fw-bold" style="font-size:0.85rem;">${s.name}</p>
                  <h3 style="color:var(--fb-green)" class="mb-2" data-outcome="${s.outcome}" data-market="${m.id}">
                    ${parseFloat(s.odds).toFixed(2)}
                  </h3>
                  ${puedeApostar(ev.status, m.status) ? `
                    <button class="btn btn-primary btn-sm w-100"
                      onclick="seleccionar(${ev.id}, ${m.id}, ${s.id}, '${s.name}', ${s.odds})">
                      APOSTAR
                    </button>
                  ` : `
                    <button class="btn btn-sm w-100" disabled
                      style="background:#1c2030; border:1px solid var(--fb-border); color:var(--fb-muted);">
                      ${m.status === 'SUSPENDED' ? 'Suspendido' :
                        ev.status === 'FINISHED' ? 'Finalizado' : 'No disponible'}
                    </button>
                  `}
                </div>
              </div>
            `).join('')}
          </div>
        `).join('')}
      </div>
    </div>
  `;

  if (ev.status === 'LIVE') {
    iniciarCronometro();
  }
}

let seleccionActual = null;

async function seleccionar(eventId, marketId, selectionId, nombre, odds) {
  if (localStorage.getItem('autoexcluido') === 'true') {
    alert('Tenes una autoexclusion activa. No podes realizar apuestas.');
    return;
  }
  seleccionActual = { eventId, marketId, selectionId, nombre, odds };
  document.getElementById('sel-nombre').textContent = nombre;
  document.getElementById('sel-odds').textContent = parseFloat(odds).toFixed(2);
  document.getElementById('monto-apuesta').value = '';
  document.getElementById('msg-apuesta').innerHTML = '';
  new bootstrap.Modal(document.getElementById('modalApuesta')).show();
}

async function confirmarApuesta() {
  const monto = document.getElementById('monto-apuesta').value;
  const msg = document.getElementById('msg-apuesta');

  if (!monto || parseFloat(monto) <= 0) {
    msg.innerHTML = '<span style="color:#e53935">Ingresa un monto valido.</span>';
    return;
  }

  const key = `bet-${Date.now()}`;
  const res = await fetch('/api/betting/bets/', {
    method: 'POST',
    headers: {
      'Authorization': `Bearer ${TOKEN}`,
      'Content-Type': 'application/json',
      'Idempotency-Key': key,
    },
    body: JSON.stringify({ selection_id: seleccionActual.selectionId, amount: monto })
  });

  const data = await res.json();
  if (res.ok || res.status === 201) {
    msg.innerHTML = `<span style="color:var(--fb-green)">Apuesta confirmada! Pago potencial: S/ ${parseFloat(data.potential_payout || monto * seleccionActual.odds).toFixed(2)}</span>`;
    cargarSaldoNavbar();
  } else {
    const errorMsg = data.error || data.detail || JSON.stringify(data);
    const esSuspendido = errorMsg.toLowerCase().includes('suspendido') || errorMsg.toLowerCase().includes('suspended');
    const esExclusion = errorMsg.toLowerCase().includes('exclu');
    const esSaldo = errorMsg.toLowerCase().includes('saldo') || errorMsg.toLowerCase().includes('insuficiente');

    if (esSuspendido) {
      msg.innerHTML = `<div class="text-center" style="color:var(--fb-gold)">
        <i class="bi bi-pause-circle" style="font-size:2rem;"></i>
        <p class="mt-2"><strong>Mercado suspendido</strong></p>
        <p style="font-size:0.85rem;">Intenta en unos segundos.</p>
      </div>`;
    } else if (esExclusion) {
      msg.innerHTML = `<div class="text-center" style="color:#e53935">
        <i class="bi bi-shield-x" style="font-size:2rem;"></i>
        <p class="mt-2"><strong>Cuenta suspendida</strong></p>
        <a href="/perfil/" class="btn btn-sm btn-outline-warning mt-1">Ver mi perfil</a>
      </div>`;
    } else if (esSaldo) {
      msg.innerHTML = `<div class="text-center" style="color:#e53935">
        <i class="bi bi-wallet2" style="font-size:2rem;"></i>
        <p class="mt-2"><strong>Saldo insuficiente</strong></p>
        <a href="/wallet/" class="btn btn-sm btn-primary mt-1">Recargar</a>
      </div>`;
    } else {
      msg.innerHTML = `<span style="color:#e53935">Error: ${errorMsg}</span>`;
    }
  }
}

cargarEvento();
</script>

<script src="{% static 'js/odds.js' %}"></script>

<div class="modal fade" id="modalApuesta" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title"><i class="bi bi-dice-5"></i> Confirmar apuesta</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <p><strong>Seleccion:</strong> <span id="sel-nombre"></span></p>
        <p><strong>Cuota:</strong> <span id="sel-odds" style="color:var(--fb-green); font-weight:700;"></span></p>
        <div class="mb-3">
          <label class="form-label">Monto (S/)</label>
          <input type="number" id="monto-apuesta" class="form-control form-control-lg"
                 placeholder="Ej: 50" min="1" step="0.01">
        </div>
        <div id="msg-apuesta"></div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
        <button class="btn btn-primary" onclick="confirmarApuesta()">
          <i class="bi bi-check-lg"></i> APOSTAR
        </button>
      </div>
    </div>
  </div>
</div>
{% endblock %}
