{% extends "base.html" %}

{% block title %}Mi Wallet — FairBet{% endblock %}

{% block content %}
<div style="max-width: 600px; margin: 40px auto; font-family: sans-serif;">

  <h1>Mi Wallet</h1>

  <!-- Saldo actual -->
  <div style="background: #f0f4f8; padding: 20px; border-radius: 8px; margin-bottom: 24px;">
    <h2>Saldo disponible</h2>
    <p id="saldo-actual" style="font-size: 2em; font-weight: bold;">Cargando...</p>
  </div>

  <!-- Recargar fichas -->
  <div style="background: #fff; border: 1px solid #ddd; padding: 20px; border-radius: 8px; margin-bottom: 16px;">
    <h2>Recargar fichas</h2>
    <input type="number" id="monto-recarga" placeholder="Monto (ej. 100)" min="1" step="0.01"
           style="width: 100%; padding: 10px; margin-bottom: 10px; font-size: 1em;">
    <button onclick="recargar()"
            style="width: 100%; padding: 12px; background: #2c5282; color: white; border: none; border-radius: 6px; font-size: 1em; cursor: pointer;">
      Recargar
    </button>
    <p id="msg-recarga" style="margin-top: 10px; color: green;"></p>
  </div>

  <!-- Retirar fichas -->
  <div style="background: #fff; border: 1px solid #ddd; padding: 20px; border-radius: 8px;">
    <h2>Retirar fichas</h2>
    <input type="number" id="monto-retiro" placeholder="Monto (ej. 50)" min="1" step="0.01"
           style="width: 100%; padding: 10px; margin-bottom: 10px; font-size: 1em;">
    <button onclick="retirar()"
            style="width: 100%; padding: 12px; background: #744210; color: white; border: none; border-radius: 6px; font-size: 1em; cursor: pointer;">
      Retirar
    </button>
    <p id="msg-retiro" style="margin-top: 10px; color: green;"></p>
  </div>

</div>

<script>
  const TOKEN = localStorage.getItem('access_token');

  async function cargarSaldo() {
    const res = await fetch('/api/wallet/balance/', {
      headers: { 'Authorization': `Bearer ${TOKEN}` }
    });
    const data = await res.json();
    document.getElementById('saldo-actual').textContent =
      res.ok ? `S/ ${parseFloat(data.balance).toFixed(2)}` : 'Error al cargar saldo';
  }

  async function recargar() {
    const monto = document.getElementById('monto-recarga').value;
    const key = `recarga-${Date.now()}`;
    const res = await fetch('/api/wallet/recharge/', {
      method: 'POST',
      headers: {
        'Authorization': `Bearer ${TOKEN}`,
        'Content-Type': 'application/json',
        'Idempotency-Key': key,
      },
      body: JSON.stringify({ amount: monto })
    });
    const data = await res.json();
    const msg = document.getElementById('msg-recarga');
    if (res.ok) {
      msg.style.color = 'green';
      msg.textContent = `✅ Recarga exitosa. Nuevo saldo: S/ ${parseFloat(data.balance).toFixed(2)}`;
      cargarSaldo();
    } else {
      msg.style.color = 'red';
      msg.textContent = `❌ Error: ${data.error || JSON.stringify(data)}`;
    }
  }

  async function retirar() {
    const monto = document.getElementById('monto-retiro').value;
    const key = `retiro-${Date.now()}`;
    const res = await fetch('/api/wallet/withdraw/', {
      method: 'POST',
      headers: {
        'Authorization': `Bearer ${TOKEN}`,
        'Content-Type': 'application/json',
        'Idempotency-Key': key,
      },
      body: JSON.stringify({ amount: monto })
    });
    const data = await res.json();
    const msg = document.getElementById('msg-retiro');
    if (res.ok) {
      msg.style.color = 'green';
      msg.textContent = `✅ Retiro exitoso. Nuevo saldo: S/ ${parseFloat(data.balance).toFixed(2)}`;
      cargarSaldo();
    } else {
      msg.style.color = 'red';
      msg.textContent = `❌ Error: ${data.error || JSON.stringify(data)}`;
    }
  }

  // Cargar saldo al abrir la página
  cargarSaldo();
</script>
{% endblock %}
