{% extends "base.html" %}

{% block title %}Mis Apuestas — FairBet Lab{% endblock %}

{% block content %}
<h2 class="mb-4"><i class="bi bi-list-check"></i> Mis Apuestas</h2>

<div id="lista-apuestas">
  <div class="text-center py-5">
    <div class="spinner-border text-primary"></div>
    <p class="mt-2 text-muted">Cargando apuestas...</p>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
const TOKEN = localStorage.getItem('access_token');
if (!TOKEN) window.location.href = '/';

const ESTADO_BADGE = {
  'ACCEPTED': 'warning',
  'WON': 'success',
  'LOST': 'danger',
  'CANCELLED': 'secondary',
};

const ESTADO_LABEL = {
  'ACCEPTED': '⏳ Pendiente',
  'WON': '✅ Ganada',
  'LOST': '❌ Perdida',
  'CANCELLED': '🚫 Cancelada',
};

async function cargarApuestas() {
  const res = await fetch('/api/betting/bets/mine/', {
    headers: { 'Authorization': `Bearer ${TOKEN}` }
  });

  if (res.status === 401) {
    localStorage.removeItem('access_token');
    window.location.href = '/';
    return;
  }

  const data = await res.json();
  const apuestas = data.results || data;
  const container = document.getElementById('lista-apuestas');

  if (!apuestas.length) {
    container.innerHTML = `
      <div class="text-center py-5">
        <i class="bi bi-inbox display-1 text-muted"></i>
        <p class="mt-3 text-muted">No tenés apuestas todavía.</p>
        <a href="/eventos/" class="btn btn-primary mt-2">
          <i class="bi bi-calendar-event"></i> Ver eventos
        </a>
      </div>`;
    return;
  }

  container.innerHTML = `
    <div class="table-responsive">
      <table class="table table-hover align-middle">
        <thead class="table-dark">
          <tr>
            <th>#</th>
            <th>Selección</th>
            <th>Cuota</th>
            <th>Monto</th>
            <th>Pago potencial</th>
            <th>Estado</th>
            <th>Fecha</th>
            <th></th>
          </tr>
        </thead>
        <tbody>
          ${apuestas.map(b => `
            <tr>
              <td><small class="text-muted">#${b.id}</small></td>
              <td><strong>${b.selection_name || b.selection}</strong></td>
              <td><span class="badge bg-primary">${parseFloat(b.odds).toFixed(2)}</span></td>
              <td>S/ ${parseFloat(b.amount).toFixed(2)}</td>
              <td>S/ ${(parseFloat(b.amount) * parseFloat(b.odds)).toFixed(2)}</td>
              <td>
                <span class="badge bg-${ESTADO_BADGE[b.status] || 'secondary'}">
                  ${ESTADO_LABEL[b.status] || b.status}
                </span>
              </td>
              <td><small>${new Date(b.created_at).toLocaleString('es-PE')}</small></td>
              <td>
                ${b.status === 'ACCEPTED' ? `
                  <button class="btn btn-sm btn-outline-warning"
                    onclick="hacerCashout(${b.id})">
                    <i class="bi bi-cash"></i> Cash-out
                  </button>
                ` : ''}
              </td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    </div>

    <div class="row mt-3">
      <div class="col-md-4">
        <div class="card border-success">
          <div class="card-body text-center">
            <h6 class="text-success">Ganadas</h6>
            <h3>${apuestas.filter(b => b.status === 'WON').length}</h3>
          </div>
        </div>
      </div>
      <div class="col-md-4">
        <div class="card border-danger">
          <div class="card-body text-center">
            <h6 class="text-danger">Perdidas</h6>
            <h3>${apuestas.filter(b => b.status === 'LOST').length}</h3>
          </div>
        </div>
      </div>
      <div class="col-md-4">
        <div class="card border-warning">
          <div class="card-body text-center">
            <h6 class="text-warning">Pendientes</h6>
            <h3>${apuestas.filter(b => b.status === 'ACCEPTED').length}</h3>
          </div>
        </div>
      </div>
    </div>
  `;
}

async function hacerCashout(betId) {
  if (!confirm('¿Confirmar cash-out de esta apuesta?')) return;

  const res = await fetch('/api/betting/cashout/', {
    method: 'POST',
    headers: {
      'Authorization': `Bearer ${TOKEN}`,
      'Content-Type': 'application/json',
    },
    body: JSON.stringify({ bet_id: betId })
  });

  const data = await res.json();
  if (res.ok) {
    alert(`✅ Cash-out exitoso. Monto devuelto: S/ ${parseFloat(data.cashout_amount || 0).toFixed(2)}`);
    cargarApuestas();
  } else {
    alert(`❌ Error: ${data.error || data.detail || JSON.stringify(data)}`);
  }
}

cargarApuestas();
</script>
{% endblock %}
