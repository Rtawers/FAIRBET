components:
  schemas:
    Event:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 200
        sport:
          type: string
          maxLength: 50
        home_team:
          type: string
          maxLength: 100
        away_team:
          type: string
          maxLength: 100
        starts_at:
          type: string
          format: date-time
        status:
          $ref: '#/components/schemas/EventStatusEnum'
        markets:
          type: array
          items:
            $ref: '#/components/schemas/Market'
          readOnly: true
      required:
      - away_team
      - home_team
      - id
      - markets
      - name
      - starts_at
    EventStatusEnum:
      enum:
      - SCHEDULED
      - LIVE
      - FINISHED
      - SUSPENDED
      - VOIDED
      type: string
      description: |-
        * `SCHEDULED` - Programado
        * `LIVE` - En vivo
        * `FINISHED` - Finalizado
        * `SUSPENDED` - Suspendido
        * `VOIDED` - Anulado
    Market:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 100
        market_type:
          type: string
          maxLength: 50
        status:
          $ref: '#/components/schemas/MarketStatusEnum'
        selections:
          type: array
          items:
            $ref: '#/components/schemas/Selection'
          readOnly: true
      required:
      - id
      - market_type
      - name
      - selections
    MarketStatusEnum:
      enum:
      - OPEN
      - SUSPENDED
      - CLOSED
      - SETTLED
      type: string
      description: |-
        * `OPEN` - Abierto
        * `SUSPENDED` - Suspendido
        * `CLOSED` - Cerrado
        * `SETTLED` - Liquidado
    PatchedEvent:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 200
        sport:
          type: string
          maxLength: 50
        home_team:
          type: string
          maxLength: 100
        away_team:
          type: string
          maxLength: 100
        starts_at:
          type: string
          format: date-time
        status:
          $ref: '#/components/schemas/EventStatusEnum'
        markets:
          type: array
          items:
            $ref: '#/components/schemas/Market'
          readOnly: true
    PatchedMarket:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 100
        market_type:
          type: string
          maxLength: 50
        status:
          $ref: '#/components/schemas/MarketStatusEnum'
        selections:
          type: array
          items:
            $ref: '#/components/schemas/Selection'
          readOnly: true
    ResultEnum:
      enum:
      - PENDING
      - WON
      - LOST
      - VOID
      type: string
      description: |-
        * `PENDING` - Pendiente
        * `WON` - Ganó
        * `LOST` - Perdió
        * `VOID` - Anulado
    Selection:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 100
        outcome:
          type: string
          maxLength: 50
        odds:
          type: string
          format: decimal
          pattern: ^-?\d{0,14}(?:\.\d{0,4})?$
        result:
          $ref: '#/components/schemas/ResultEnum'
      required:
      - id
      - name
      - odds
      - outcome
    TokenObtainPair:
      type: object
      properties:
        username:
          type: string
          writeOnly: true
        password:
          type: string
          writeOnly: true
        access:
          type: string
          readOnly: true
        refresh:
          type: string
          readOnly: true
      required:
      - access
      - password
      - refresh
      - username
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: sessionid
    jwtAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
